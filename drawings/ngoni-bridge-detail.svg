<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" font-family="Inter,Arial,sans-serif">
  <rect width="640" height="420" fill="#fafaf8"/>
  <rect x="6" y="6" width="628" height="408" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="6" y1="368" x2="634" y2="368" stroke="#444" stroke-width="1"/>

  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#1a6bb0"/>
    </marker>
    <marker id="arrl2" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto-start-reverse">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#1a6bb0"/>
    </marker>
  </defs>

  <!-- Bridge front elevation (2:1 scale, 4 in wide = 192 px, 0.75 in tall = 36 px) -->
  <!-- Origin: left=120, top=160 -->
  <!-- Crown arch: raise center by ~4px -->
  <path d="M 120,196 L 120,160 Q 216,150 312,160 L 312,196 Z"
        fill="#d4a847" stroke="#886633" stroke-width="2"/>

  <!-- String notches (10 notches at ~9.2 px spacing in 2:1) -->
  <!-- notch positions: first at 120+9.2/2, then +9.2 each -->
  <line x1="124" y1="150" x2="124" y2="154" stroke="#555" stroke-width="1.5"/>
  <line x1="133" y1="150" x2="133" y2="154" stroke="#555" stroke-width="1.5"/>
  <line x1="143" y1="150" x2="143" y2="154" stroke="#555" stroke-width="1.5"/>
  <line x1="152" y1="149" x2="152" y2="153" stroke="#555" stroke-width="1.5"/>
  <line x1="162" y1="149" x2="162" y2="153" stroke="#555" stroke-width="1.5"/>
  <line x1="171" y1="149" x2="171" y2="153" stroke="#555" stroke-width="1.5"/>
  <line x1="181" y1="150" x2="181" y2="154" stroke="#555" stroke-width="1.5"/>
  <line x1="190" y1="150" x2="190" y2="154" stroke="#555" stroke-width="1.5"/>
  <line x1="200" y1="150" x2="200" y2="154" stroke="#555" stroke-width="1.5"/>
  <line x1="209" y1="150" x2="209" y2="154" stroke="#555" stroke-width="1.5"/>

  <!-- Skin plane (brown line at bottom of bridge) -->
  <line x1="80" y1="196" x2="360" y2="196" stroke="#8B4513" stroke-width="2.5"/>
  <text x="362" y="199" font-size="9" fill="#8B4513">Skin plane</text>

  <!-- Bridge foot label area (hatching to show wood grain) -->
  <text x="190" y="190" font-size="9" fill="#886633" text-anchor="middle" font-style="italic">Hard Maple</text>

  <!-- Dimension: 4.0 in wide -->
  <line x1="120" y1="215" x2="312" y2="215" stroke="#1a6bb0" stroke-width="1" marker-start="url(#arrl2)" marker-end="url(#arr2)"/>
  <line x1="120" y1="196" x2="120" y2="217" stroke="#1a6bb0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="312" y1="196" x2="312" y2="217" stroke="#1a6bb0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="216" y="228" font-size="10" fill="#1a6bb0" text-anchor="middle">4.0 in (102 mm)</text>

  <!-- Dimension: 0.75 in tall -->
  <line x1="330" y1="160" x2="330" y2="196" stroke="#1a6bb0" stroke-width="1" marker-start="url(#arrl2)" marker-end="url(#arr2)"/>
  <line x1="312" y1="160" x2="332" y2="160" stroke="#1a6bb0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="312" y1="196" x2="332" y2="196" stroke="#1a6bb0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="360" y="182" font-size="10" fill="#1a6bb0">0.75 in</text>

  <!-- Crown height callout -->
  <line x1="216" y1="150" x2="216" y2="160" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="216" y1="150" x2="260" y2="128" stroke="#555" stroke-width="0.9"/>
  <text x="262" y="126" font-size="9" fill="#333">Crown arch ~1/16 in at center</text>

  <!-- Notch callout -->
  <line x1="143" y1="150" x2="143" y2="118" stroke="#555" stroke-width="0.9"/>
  <line x1="143" y1="118" x2="30" y2="118" stroke="#555" stroke-width="0.9"/>
  <text x="16" y="115" font-size="9" fill="#333">Notch: 1 mm × 1 mm</text>
  <text x="16" y="127" font-size="9" fill="#333">(10 notches total)</text>

  <!-- Notch spacing dim (first two notches) -->
  <line x1="124" y1="82" x2="133" y2="82" stroke="#1a6bb0" stroke-width="1" marker-start="url(#arrl2)" marker-end="url(#arr2)"/>
  <line x1="124" y1="150" x2="124" y2="80" stroke="#1a6bb0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="133" y1="150" x2="133" y2="80" stroke="#1a6bb0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="128" y="75" font-size="9" fill="#1a6bb0" text-anchor="middle">8 mm</text>
  <text x="128" y="66" font-size="9" fill="#1a6bb0" text-anchor="middle">c/c</text>

  <!-- Break angle callout -->
  <path d="M 152,153 L 152,180 L 130,196" fill="none" stroke="#b00" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="90" y="250" font-size="9" fill="#cc0000">String break angle</text>
  <text x="90" y="262" font-size="9" fill="#cc0000">target ≥ 10°</text>
  <text x="90" y="274" font-size="9" fill="#cc0000">(verify at prototype)</text>

  <!-- Side view inset -->
  <text x="400" y="130" font-size="10" fill="#333" font-weight="bold">Side View</text>
  <!-- Bridge side: 2 in wide = 96 px, 0.75 in = 36 px -->
  <path d="M 400,196 L 400,160 Q 448,151 496,160 L 496,196 Z" fill="#d4a847" stroke="#886633" stroke-width="1.5"/>
  <line x1="360" y1="196" x2="540" y2="196" stroke="#8B4513" stroke-width="2.5"/>
  <!-- Dim: 2 in wide -->
  <line x1="400" y1="215" x2="496" y2="215" stroke="#1a6bb0" stroke-width="1" marker-start="url(#arrl2)" marker-end="url(#arr2)"/>
  <text x="448" y="228" font-size="10" fill="#1a6bb0" text-anchor="middle">2.0 in (51 mm)</text>
  <text x="420" y="185" font-size="9" fill="#886633" font-style="italic">Maple</text>
  <text x="395" y="250" font-size="9" fill="#888">Broad foot distributes</text>
  <text x="395" y="262" font-size="9" fill="#888">load on skin</text>

  <!-- Title block -->
  <text x="16" y="381" font-size="8.5" fill="#888">PROJECT</text>
  <text x="16" y="394" font-size="11" font-weight="bold" fill="#222">Ngoni (Kamele N'goni)</text>
  <text x="180" y="381" font-size="8.5" fill="#888">DRAWING</text>
  <text x="180" y="394" font-size="11" font-weight="bold" fill="#222">DWG-NGO-005 — Bridge Detail (2:1)</text>
  <text x="490" y="381" font-size="8.5" fill="#888">DATE / REV</text>
  <text x="490" y="394" font-size="10" fill="#222">2026-05-08 · Rev A</text>
  <text x="16" y="410" font-size="8" fill="#aaa">Tony Koop — Heifer Zephyr Instrument Works · Material: Hard Maple · All dims inches (mm) · Notch dims TBD on prototype</text>
</svg>
